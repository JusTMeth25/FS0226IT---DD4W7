    <section class="lista-section">
      <div class="lista-header">
        <h2>I tuoi libri (<span id="contatore">0</span>) </h2>
        <button id="export-all" class="btn-export">Esporta tutto</button>
        <button id="svuota-tutto" class="btn-svuota">Svuota tutto</button>
      </div>
      <p class="info-storage">I libri sono salvati nel browser e sopravvivono al refresh.</p>
      <div class="filter-buttons mb-3">
        <button id="filter-all" class="btn-all">Tutti</button>
        <button id="filter-read" class="btn-letti">Letti</button>
        <button id="filter-toRead" class="btn-daLeggere">Da leggere</button>
      </div>
      <div class="ordina-libri mb-3">
        <label for="ordina">Ordina per</label>
        <select id="ordina" class="form-select">

          <option value="anno">Anno</option>
